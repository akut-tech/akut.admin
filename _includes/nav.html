<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="brand">
    <span class="brand-mark">🍽️</span>
    <span class="brand-name" data-i18n="nav.brand">Akut Admin</span>
  </div>
  <nav class="nav">
    <a class="nav-link" href="{{ '/' | relative_url }}" data-nav="dashboard" data-i18n="nav.dashboard">Dashboard</a>
    <a class="nav-link" href="{{ '/menu/' | relative_url }}" data-nav="menu" data-i18n="nav.menu">Menu</a>
    <a class="nav-link" href="{{ '/tenant/' | relative_url }}" data-nav="tenant" data-i18n="nav.tenant">Tenant</a>
  </nav>
  <div class="sidebar-footer">
    <div class="lang-switcher">
      <button type="button" class="lang-btn" data-lang-btn="en" onclick="AkutI18n.setLang('en')">EN</button>
      <button type="button" class="lang-btn" data-lang-btn="pt" onclick="AkutI18n.setLang('pt')">PT</button>
    </div>
    <div class="user-card">
      <div class="user-name" id="navUserName">—</div>
      <div class="user-meta" id="navUserMeta">—</div>
    </div>
    <button type="button" class="btn btn-ghost btn-block" onclick="AkutAuth.logout()" data-i18n="nav.signOut">Sign out</button>
  </div>
</aside>
<script>
  (function () {
    var key = document.body.getAttribute('data-page');
    if (key) {
      var active = document.querySelector('.nav-link[data-nav="' + key + '"]');
      if (active) active.classList.add('is-active');
    }
    if (!AkutAuth.isAdmin()) {
      var tenantLink = document.querySelector('.nav-link[data-nav="tenant"]');
      if (tenantLink) tenantLink.hidden = true;
    }
    document.addEventListener('DOMContentLoaded', AkutAuth.renderUserCard);
  })();
</script>
<script>
  (function () {
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('sidebarOverlay');

    function openSidebar() {
      sidebar.classList.add('is-open');
      overlay.classList.add('is-open');
      var toggle = document.getElementById('sidebarToggle');
      if (toggle) toggle.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
      sidebar.classList.remove('is-open');
      overlay.classList.remove('is-open');
      var toggle = document.getElementById('sidebarToggle');
      if (toggle) toggle.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    if (overlay) overlay.addEventListener('click', closeSidebar);

    document.querySelectorAll('.nav-link').forEach(function (link) {
      link.addEventListener('click', closeSidebar);
    });

    // sidebarToggle lives in app.html (after this include), so bind after full DOM is ready
    document.addEventListener('DOMContentLoaded', function () {
      var toggle = document.getElementById('sidebarToggle');
      if (toggle) toggle.addEventListener('click', openSidebar);
    });
  })();
</script>
