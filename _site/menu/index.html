<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Menu · Akut Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
<link rel="stylesheet" href="/assets/css/style.css">
<!-- App config is generated from _config.yml -> assets/js/config.js -->
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/auth.js"></script>

</head>
<body class="layout-app" data-page="menu">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="brand">
    <span class="brand-mark">🍽️</span>
    <span class="brand-name" data-i18n="nav.brand">Akut Admin</span>
  </div>
  <nav class="nav">
    <a class="nav-link" href="/" data-nav="dashboard" data-i18n="nav.dashboard">Dashboard</a>
    <a class="nav-link" href="/menu/" data-nav="menu" data-i18n="nav.menu">Menu</a>
    <a class="nav-link" href="/tenant/" data-nav="tenant" data-i18n="nav.tenant">Tenant</a>
  </nav>
  <div class="sidebar-footer">
    <div class="lang-switcher">
      <button type="button" class="lang-btn" data-lang-btn="en" onclick="AkutI18n.setLang('en')">EN</button>
      <button type="button" class="lang-btn" data-lang-btn="pt" onclick="AkutI18n.setLang('pt')">PT</button>
    </div>
    <div class="user-card">
      <div class="user-name" id="navUserName">—</div>
      <div class="user-meta" id="navUserMeta">—</div>
    </div>
    <button type="button" class="btn btn-ghost btn-block" onclick="AkutAuth.logout()" data-i18n="nav.signOut">Sign out</button>
  </div>
</aside>
<script>
  (function () {
    var key = document.body.getAttribute('data-page');
    if (key) {
      var active = document.querySelector('.nav-link[data-nav="' + key + '"]');
      if (active) active.classList.add('is-active');
    }
    if (!AkutAuth.isAdmin()) {
      var tenantLink = document.querySelector('.nav-link[data-nav="tenant"]');
      if (tenantLink) tenantLink.hidden = true;
    }
    document.addEventListener('DOMContentLoaded', AkutAuth.renderUserCard);
  })();
</script>
<script>
  (function () {
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('sidebarOverlay');
    var toggle  = document.getElementById('sidebarToggle');

    function openSidebar() {
      sidebar.classList.add('is-open');
      overlay.classList.add('is-open');
      if (toggle) toggle.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
      sidebar.classList.remove('is-open');
      overlay.classList.remove('is-open');
      if (toggle) toggle.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    if (toggle)  toggle.addEventListener('click', openSidebar);
    if (overlay) overlay.addEventListener('click', closeSidebar);

    document.querySelectorAll('.nav-link').forEach(function (link) {
      link.addEventListener('click', closeSidebar);
    });
  })();
</script>

  <main class="app-main">
    <div class="mobile-topbar">
      <button class="hamburger" id="sidebarToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="sidebar">&#9776;</button>
      <span class="brand-mark">🍽️</span>
      <span class="brand-name">Akut Admin</span>
    </div>
    <header class="page-header">
      <h1>Menu editor</h1>
      <p class="page-sub">Edit the active menu or work on a draft</p>
    </header>
    <div class="page-body">
      <div class="toolbar">
  <div class="toolbar-group">
    <label class="field-inline">
      <span class="field-label" data-i18n="menu.editing">Editing</span>
      <select id="statusSelect">
        <option value="Active" data-i18n="menu.activeMenu">Active menu</option>
        <option value="Draft" data-i18n="menu.draft">Draft</option>
      </select>
    </label>
    <button type="button" class="btn btn-secondary" id="loadBtn" data-i18n="menu.load">Load</button>
    <button type="button" class="btn btn-ghost" id="newBtn" data-i18n="menu.newMenu">New menu</button>
  </div>

  <div class="toolbar-group">
    <div class="segmented">
      <button type="button" class="seg is-active" id="formTab" data-i18n="menu.form">Form</button>
      <button type="button" class="seg" id="jsonTab" data-i18n="menu.json">JSON</button>
    </div>
    <button type="button" class="btn btn-secondary" id="saveDraftBtn" data-i18n="menu.saveDraft">Save as draft</button>
    <button type="button" class="btn btn-primary" id="publishBtn" data-i18n="menu.publish">Publish (Active)</button>
  </div>
</div>

<div id="menuAlert" class="alert" hidden></div>

<div id="loadingState" class="empty-state" hidden data-i18n="menu.loading">Loading…</div>

<div id="emptyState" class="empty-state" hidden data-i18n-html="menu.empty">
  No menu loaded.
</div>

<!-- Form editor -->
<div id="editorRoot" hidden></div>

<!-- Raw JSON editor -->
<div id="jsonRoot" class="card" hidden>
  <p class="field-help" data-i18n-html="menu.jsonHelp" data-i18n-vars='{"path":"/menu"}'></p>
  <textarea id="jsonArea" class="json-area" spellcheck="false"></textarea>
  <div class="inline-controls">
    <button type="button" class="btn btn-secondary" id="jsonApply" data-i18n="menu.applyToForm">Apply to form</button>
    <span class="field-saved" id="jsonStatus"></span>
  </div>
</div>

    </div>
  </main>
  <!-- Guard: redirect to login if there is no valid session -->
  <script>AkutAuth.requireAuth();</script>
  
    
      <script src="/assets/js/api.js"></script>
    
      <script src="/assets/js/menu.js"></script>
    
  
</body>
</html>
