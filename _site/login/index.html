<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Sign in · Akut Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
<link rel="stylesheet" href="/assets/css/style.css">
<!-- App config is generated from _config.yml -> assets/js/config.js -->
<script src="/assets/js/config.js"></script>
<script src="/assets/js/auth.js"></script>

</head>
<body class="layout-plain">
  <main class="plain-main">
    <div class="auth-card">
  <div class="auth-brand">
    <span class="brand-mark">🍽️</span>
    <h1>Akut Admin</h1>
    <p class="auth-tagline">Manage menus &amp; tenants</p>
  </div>

  <form id="loginForm" class="auth-form" autocomplete="on" novalidate>
    <label class="field">
      <span class="field-label">Username</span>
      <input type="text" id="username" name="username" autocomplete="username"
             required autofocus placeholder="you@example.com">
    </label>

    <label class="field">
      <span class="field-label">Password</span>
      <input type="password" id="password" name="password"
             autocomplete="current-password" required placeholder="••••••••">
    </label>

    <div id="loginError" class="alert alert-error" hidden></div>

    <button type="submit" id="loginButton" class="btn btn-primary btn-block">
      Sign in
    </button>
  </form>

  <p class="auth-foot">Authenticated with Amazon Cognito</p>
</div>

<script src="/assets/js/login.js"></script>

  </main>
</body>
</html>
