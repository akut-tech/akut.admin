<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  {% include head.html %}
</head>
<body class="layout-app" data-page="{{ page.nav_key }}">
  {% include nav.html %}
  <main class="app-main">
    <div class="mobile-topbar">
      <button class="hamburger" id="sidebarToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="sidebar">&#9776;</button>
      <span class="brand-mark">🍽️</span>
      <span class="brand-name">Akut Admin</span>
    </div>
    <header class="page-header">
      <h1>{{ page.heading | default: page.title }}</h1>
      {% if page.subheading %}<p class="page-sub">{{ page.subheading }}</p>{% endif %}
    </header>
    <div class="page-body">
      {{ content }}
    </div>
  </main>
  <!-- Guard: redirect to login if there is no valid session -->
  <script>AkutAuth.requireAuth();</script>
  {% if page.app_scripts %}
    {% for script in page.app_scripts %}
      <script src="{{ script | relative_url }}"></script>
    {% endfor %}
  {% endif %}
</body>
</html>
